name: CI Tests

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  server-tests:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci
      
      - name: Run server tests
        working-directory: ./server
        run: npm test
      
      - name: Generate server coverage report
        working-directory: ./server
        run: npm run test:coverage
        continue-on-error: true
      
      - name: Upload server coverage
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage
        if: always()
  
  client-tests:
    name: Client Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Run client tests
        working-directory: ./client
        run: npm test
      
      - name: Generate client coverage report
        working-directory: ./client
        run: npm run test:coverage
        continue-on-error: true
      
      - name: Upload client coverage
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: client/coverage
        if: always()
  
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [server-tests, client-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install root dependencies
        run: npm ci
      
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: playwright-report
        if: always()
  
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [server-tests, client-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download server coverage
        uses: actions/download-artifact@v4
        with:
          name: server-coverage
          path: server/coverage
        continue-on-error: true
      
      - name: Download client coverage
        uses: actions/download-artifact@v4
        with:
          name: client-coverage
          path: client/coverage
        continue-on-error: true
      
      - name: Display coverage summary
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Server Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f "server/coverage/coverage-summary.json" ]; then
            cat server/coverage/coverage-summary.json || echo "No server coverage data"
          else
            echo "No server coverage report found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Client Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f "client/coverage/coverage-summary.json" ]; then
            cat client/coverage/coverage-summary.json || echo "No client coverage data"
          else
            echo "No client coverage report found" >> $GITHUB_STEP_SUMMARY
          fi
